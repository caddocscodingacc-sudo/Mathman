<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUM3R1C: QUANTUM AUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #00f7ff; --p2: #ff0055; --p3: #00ff44; --bg: #030303;
            --f-mono: 'Share Tech Mono', monospace; --f-num: 'Orbitron', sans-serif;
            --accent: var(--p1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background-color: var(--bg); color: var(--accent);
            font-family: var(--f-mono); height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; perspective: 1200px;
        }

        /* --- 3D MENU --- */
        #master-loader { 
            position: absolute; z-index: 2000; transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .setup-box { 
            width: 320px; border: 2px solid var(--accent); padding: 30px; 
            background: rgba(10, 10, 10, 0.95); text-align: center;
            box-shadow: 0 0 40px rgba(0, 247, 255, 0.15);
            transform: rotateX(10deg) rotateY(-5deg);
            animation: menuHover 4s infinite ease-in-out;
        }
        @keyframes menuHover { 0%, 100% { transform: rotateX(10deg) rotateY(-5deg); } 50% { transform: rotateX(15deg) rotateY(5deg); } }
        
        .menu-out { transform: translateZ(800px) rotateX(-120deg) !important; opacity: 0; pointer-events: none; }

        /* --- GAME ENGINE --- */
        #titan-engine { 
            display: none; width: 100%; height: 100%; flex-direction: column; 
            padding: 20px; opacity: 0; transition: 1.2s; transform: scale(0.8) translateZ(-500px);
        }
        #titan-engine.active { display: flex; opacity: 1; transform: scale(1) translateZ(0); }

        .logic-header { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; text-align: center; }
        #math-out { font-size: 2.2rem; color: #fff; font-family: var(--f-num); text-shadow: 0 0 10px var(--accent); }

        /* --- 3D STAGE --- */
        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; transform-style: preserve-3d; }
        .dice-pair { display: flex; gap: 30px; transform-style: preserve-3d; }
        .die { width: 70px; height: 70px; position: relative; transform-style: preserve-3d; transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1.2); }
        .side { 
            position: absolute; width: 70px; height: 70px; background: #000; 
            border: 2px solid var(--accent); display: flex; align-items: center; 
            justify-content: center; font-family: var(--f-num); font-size: 24px; color: var(--accent); 
            backface-visibility: hidden; box-shadow: inset 0 0 10px var(--accent);
        }
        
        .f1 { transform: rotateY(0deg) translateZ(35px); }
        .f6 { transform: rotateY(180deg) translateZ(35px); }
        .f3 { transform: rotateY(90deg) translateZ(35px); }
        .f4 { transform: rotateY(-90deg) translateZ(35px); }
        .f2 { transform: rotateX(90deg) translateZ(35px); }
        .f5 { transform: rotateX(-90deg) translateZ(35px); }

        /* --- BUTTONS --- */
        .control-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .btn-node { 
            background: rgba(0,0,0,0.6); border: 1px solid var(--accent); 
            color: var(--accent); padding: 20px 0; font-size: 1.5rem; font-family: var(--f-num);
            transition: 0.2s; transform-style: preserve-3d; cursor: pointer;
        }
        .btn-node:active { transform: translateZ(-15px); background: var(--accent); color: #000; }

        /* --- EFFECTS --- */
        .death-flash { animation: glitch-red 0.4s infinite; }
        @keyframes glitch-red {
            0% { background: #000; }
            50% { background: #300; transform: scale(1.02) rotate(1deg); }
            100% { background: #000; }
        }
        .btn-fall { transform: translateY(800px) rotateZ(45deg) !important; opacity: 0; transition: 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045); }

        .btn-main { width: 100%; padding: 12px; margin-top: 10px; background: #111; border: 1px solid var(--accent); color: var(--accent); font-family: var(--f-mono); font-size: 1rem; }
        .btn-start { background: var(--accent); color: #000; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body id="main-body">

    <div id="master-loader">
        <div class="setup-box">
            <h1 style="font-family:var(--f-num); font-size: 1.8rem;">NUM3R1C</h1>
            <p style="font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 20px; opacity: 0.7;">QUANTUM VIRTUAL TERMINAL</p>
            
            <select id="p-count" class="btn-main">
                <option value="1">1 NODE (SOLO)</option>
                <option value="2">2 NODES (VS)</option>
            </select>

            <select id="l-mode" class="btn-main">
                <option value="add">ADDITION (+)</option>
                <option value="sub">SUBTRACTION (-)</option>
                <option value="mult">MULTIPLICATION (×)</option>
                <option value="div">DIVISION (÷)</option>
            </select>
            
            <button class="btn-main btn-start" onclick="initGame()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <main id="titan-engine">
        <div class="logic-header"><div id="math-out">READY...</div></div>
        <div class="stage">
            <div id="dice-pair" class="dice-pair">
                <div id="die1" class="die">
                    <div class="side f1">1</div><div class="side f6">6</div><div class="side f3">3</div><div class="side f4">4</div><div class="side f2">2</div><div class="side f5">5</div>
                </div>
                <div id="die2" class="die">
                    <div class="side f1">1</div><div class="side f6">6</div><div class="side f3">3</div><div class="side f4">4</div><div class="side f2">2</div><div class="side f5">5</div>
                </div>
            </div>
        </div>
        <div class="footer-ui"><div id="node-box" class="control-panel"></div></div>
    </main>

    <script>
        let state = { mode: 'add', target: 0, busy: false };
        let audioCtx = null;

        // --- AUDIO ENGINE ---
        function playSound(freq, type, duration, vol=0.1) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            start: () => { playSound(100, 'sawtooth', 0.5); playSound(200, 'square', 0.8, 0.05); },
            correct: () => playSound(880, 'sine', 0.4, 0.2),
            error: () => { playSound(150, 'sawtooth', 0.6, 0.3); playSound(70, 'square', 0.8, 0.4); }
        };

        const rotations = [
            {v: 1, x: 0, y: 0}, {v: 2, x: -90, y: 0}, {v: 3, x: 0, y: -90},
            {v: 4, x: 0, y: 90}, {v: 5, x: 90, y: 0}, {v: 6, x: 0, y: 180}
        ];

        function initGame() {
            state.mode = document.getElementById('l-mode').value;
            sfx.start();
            document.getElementById('master-loader').classList.add('menu-out');
            const engine = document.getElementById('titan-engine');
            engine.style.display = 'flex';
            setTimeout(() => { engine.classList.add('active'); nextRound(); }, 200);
        }

        function nextRound() {
            state.busy = false;
            let v1, v2;

            if(state.mode === 'div') {
                v2 = Math.floor(Math.random()*5)+1;
                state.target = Math.floor(Math.random()*6)+1;
                v1 = v2 * state.target; // Ensures clean division
            } else if(state.mode === 'sub') {
                v1 = Math.floor(Math.random()*6)+4;
                v2 = Math.floor(Math.random()*3)+1;
                state.target = v1 - v2;
            } else if(state.mode === 'mult') {
                v1 = Math.floor(Math.random()*6)+1;
                v2 = Math.floor(Math.random()*6)+1;
                state.target = v1 * v2;
            } else {
                v1 = Math.floor(Math.random()*6)+1;
                v2 = Math.floor(Math.random()*6)+1;
                state.target = v1 + v2;
            }
            
            const symbols = {add:'+', sub:'-', mult:'×', div:'÷'};
            document.getElementById('math-out').innerText = `${v1} ${symbols[state.mode]} ${v2} = ?`;
            
            // Dice only show 1-6; for numbers > 6 in Div/Sub, we use "Glitch" faces
            rollDie('die1', v1); rollDie('die2', v2);
            renderButtons();
        }

        function rollDie(id, val) {
            const rot = rotations.find(r => r.v === val) || {x: Math.random()*360, y: Math.random()*360};
            document.getElementById(id).style.transform = `rotateX(${rot.x}deg) rotateY(${rot.y}deg)`;
        }

        function renderButtons() {
            const b = document.getElementById('node-box'); 
            b.innerHTML = '';
            let choices = [state.target, state.target + 1, Math.max(0, state.target - 1)];
            choices = [...new Set(choices)].sort(() => Math.random() - 0.5);

            choices.forEach(v => {
                const btn = document.createElement('button');
                btn.className = 'btn-node';
                btn.innerText = v;
                btn.onclick = () => {
                    if(state.busy) return;
                    state.busy = true;
                    if(v === state.target) {
                        sfx.correct();
                        btn.style.borderColor = 'var(--p3)';
                        setTimeout(nextRound, 500);
                    } else {
                        sfx.error();
                        document.body.classList.add('death-flash');
                        document.querySelectorAll('.btn-node').forEach(nb => nb.classList.add('btn-fall'));
                        setTimeout(() => {
                            document.body.classList.remove('death-flash');
                            nextRound();
                        }, 1000);
                    }
                };
                b.appendChild(btn);
            });
        }
    </script>
</body>
</html>
